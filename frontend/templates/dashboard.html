{% extends "base.html" %}
{% block title %}New Diagnosis{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h3 class="card-title mb-3">Diagnose a Plant</h3>
                <p class="text-muted">Upload a photo of a leaf to get an instant diagnosis.</p>
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input type="file" name="image" accept="image/*" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success">
                        Diagnose
                    </button>
                </form>
                <div class="form-text mt-2">
                    The first request after starting the server may take a
                    little longer while the model loads.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
